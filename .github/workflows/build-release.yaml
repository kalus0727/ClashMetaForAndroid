name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release Tag (v2.x.x)'
        required: true

jobs:
  BuildRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: 'https://github.com/MetaCubeX/go/releases/download/build'
          go-version: '1.26'

      - name: Apply Patches
        run: |
          cd $(go env GOROOT)
          for p in $GITHUB_WORKSPACE/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
          
      - name: Convert and set version env
        id: process-version
        run: |
          VERSION_TAG=${{ inputs.release-tag }}
          VERSION_TAG=${VERSION_TAG#v}                             # remove the 'v' prefix
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_TAG"        # split into array
          VERSION_CODE=$(printf "%1d%02d%03d" "${VERSION_PARTS[0]}" "${VERSION_PARTS[1]}" "${VERSION_PARTS[2]}")
          
          # 修复了拼写错误: verson -> version
          echo "versionName=$VERSION_TAG" >> $GITHUB_OUTPUT        
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT       
          
      # Re-write version in build.gradle.kts
      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: build.gradle.kts
          versionCode: ${{ steps.process-version.outputs.versionCode }}
          versionName: ${{ steps.process-version.outputs.versionName }}
          
      # If any change found, commit it and push
      - name: Commit and push if changes
        run: |
          # 修复: 改用 git status --porcelain 检查工作区变更，更加健壮
          if [[ -n $(git status --porcelain) ]]; then
            newVersionName=${{ steps.process-version.outputs.versionName }}
            newVersionCode=${{ steps.process-version.outputs.versionCode }}
            git config --global user.name 'GitHub Action'
            git config --global user.email 'action@github.com'
            git add build.gradle.kts
            git commit -am "Bump version to $newVersionName ($newVersionCode)"
            git tag "v$newVersionName"
            git push --follow-tags
          fi

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleMetaRelease

      # 👇 修复: 加入 Zipalign 字节对齐，移除写死的 v1/v2 限制，输出纯净的 release 包
      - name: 手动签名 APK (适配 Android 16 严格要求)
        run: |
          # 1. 还原密钥
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > my-release-key.jks
          
          # 2. 找到 Zipalign 和 Apksigner 工具
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -r | head -n 1)
          APK_SIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          
          # 3. 循环处理 APK
          for apk in app/build/outputs/apk/meta/release/*.apk; do
            # 跳过已经签名的文件
            if [[ $apk == *"-signed.apk" ]]; then continue; fi
            
            filepath=$(dirname "$apk")
            filename=$(basename "$apk")
            aligned_apk="$filepath/aligned-$filename"
            signed_apk="$filepath/${filename%.apk}-signed.apk"
            
            echo "正在对 $apk 进行 Zipalign 字节对齐..."
            $ZIPALIGN -p -f 4 "$apk" "$aligned_apk"
            
            echo "正在为 $apk 签名 (工具将自动适配 v2/v3 签名)..."
            $APK_SIGNER sign --ks my-release-key.jks \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" \
              "$aligned_apk"
              
            # 4. 立即验证签名是否有效
            echo "验证 $signed_apk 签名状态:"
            $APK_SIGNER verify "$signed_apk"
            
            # 清理未对齐的中间文件和未签名的原包
            rm "$apk" "$aligned_apk"
          done
          
          # 清理密钥
          rm my-release-key.jks
  
      # (注意：已删除冲突的 richardsimko/update-tag@v1 步骤)

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          tag_name: ${{ inputs.release-tag }}
          # 上传刚才生成的所有带 -signed 后缀的安全包
          files: app/build/outputs/apk/meta/release/*-signed.apk
          generate_release_notes: true
